<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema MCP</title>

  <!-- Identidad: favicon + icono iOS + manifest PWA (instalar como app/acceso directo).
       Rutas RELATIVAS: funcionan en dev (raíz), en dist bajo subruta y con base './'. -->
  <link rel="icon" type="image/png" sizes="64x64" href="./icons/favicon-64.png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#006064" />

  <!-- SheetJS se carga por CDN: la versión de npm está desactualizada/deprecada.
       El módulo core/sheets.js accede a window.XLSX de forma protegida. -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <!-- D3 v7 por CDN: lo usa la vista Biología Molecular (gráficos SVG portados de BIOMOL). -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <!-- Fuentes de la vista Registros (migración de Fichas): IBM Plex + Syne. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
