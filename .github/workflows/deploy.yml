# Compila el proyecto Vite y lo publica en GitHub Pages.
# Se ejecuta automáticamente en cada push a la rama master.
name: Deploy a GitHub Pages

on:
  push:
    branches: [master]
  # Permite lanzarlo manualmente desde la pestaña "Actions" del repo.
  workflow_dispatch:

# Permisos mínimos necesarios para publicar en Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues solapados: si llega un push nuevo, cancela el anterior.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (genera /dist)
        run: npm run build

      - name: Preparar artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
